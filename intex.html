<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: white;
      line-height: 1.6;
    }
    header {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
                  url('gallery-pic-4.png') center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    header h1 {
      font-size: 4rem;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }
    header p {
      font-size: 1.2rem;
      max-width: 600px;
      color: #ddd;
    }
    .btn {
      margin-top: 25px;
      padding: 14px 30px;
      background: white;
      color: black;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 70px 10%;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #1b1b1d;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-8px); }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card h3 {
      padding: 18px;
      font-size: 1.2rem;
    }
    footer {
      text-align: center;
      padding: 25px;
      background: #151515;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <h1>TM DHARAVI</h1>
    <p>Experience Premium edits at dharavi boyz </p>
    <a href="#Collection" class="btn">Explore</a>
  </header>  <section id="gallery">
    <h2 style="font-size:2rem; margin-bottom:20px;">Featured Collection</h2>
    <div class="gallery">
      <div class="card">
        <img src="gallery-pic-1.png" alt=Adhil>
        <h3>Creative Character</h3>
      </div>
      <div class="card">
        <img src="gallery-pic-2.png" alt="joshwa2">
        <h3>Planet Style Art</h3>
      </div>
      <div class="card">
        <img src="gallery-pic-3.png" alt="sinan 3">
        <h3>Pineapple Theme</h3>
      </div>
      <div class="card">
        <img src="gallerympic-4.png" alt="arjun 4">
        <h3>Banana Theme</h3>
      </div>
    </div>
  </section>  <footer>
    © 2026 dharavi boys | 
  </footer>
</body>
</html>
